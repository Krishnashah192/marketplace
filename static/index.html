<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeuralBazaar — AI Marketplace</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>⚡ NeuralBazaar</h1>
  <p>The AI marketplace with outcome pricing, agent negotiation &amp; verified trust.</p>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search models…">
    <select id="category">
      <option value="">All categories</option>
      <option>LLM</option><option>Healthcare</option>
      <option>Image</option><option>Legal</option>
    </select>
  </div>
</header>

<main id="grid" aria-live="polite"></main>

<dialog id="detail">
  <button class="close" onclick="detail.close()">✕</button>
  <div id="detail-body"></div>
</dialog>

<script src="app.js"></script>
</body>
</html>
